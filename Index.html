<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Elanco - Parasite Risk Map</title>

<link rel="stylesheet" href="style.css">

<!-- Leaflet -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- map and calculator -->
<script src="script.js" defer></script>
<script src="parasiteCalculator.js" defer></script>
<script src="map-content.js" defer></script>
<script src="parasite_popup.js" defer></script>

</head>

<body>

<nav class="navbar">
    <img class="navbar-logo" src="./images/logo.png" alt="Logo">
</nav>

<main>
    <div id="map"></div>

    <aside class="sidebar">

        <div class="info-box">
            <h3 id="region-name">Select a location</h3>
        </div>

        <div class="info-box">
            <h2>Overall Risk</h2>
            <div id="overall-badge" class="risk-badge">—</div>
        </div>

        <div class="info-box">
            <h2>Parasite Risks</h2>
            <div class="risk-grid">

                <!-- Repeat block -->
                <div class="risk-item">
                    <div class="risk-header">Gutworm <span id="risk-gutworm">—%</span></div>
                    <div class="risk-bar"><div id="bar-gutworm" class="risk-fill"></div></div>
                </div>

                <div class="risk-item">
                    <div class="risk-header">Lungworm <span id="risk-lungworm">—%</span></div>
                    <div class="risk-bar"><div id="bar-lungworm" class="risk-fill"></div></div>
                </div>

                <div class="risk-item">
                    <div class="risk-header">Fluke <span id="risk-liverfluke">—%</span></div>
                    <div class="risk-bar"><div id="bar-liverfluke" class="risk-fill"></div></div>
                </div>

                <div class="risk-item">
                    <div class="risk-header">Hairworm <span id="risk-hairworm">—%</span></div>
                    <div class="risk-bar"><div id="bar-hairworm" class="risk-fill"></div></div>
                </div>

                <div class="risk-item">
                    <div class="risk-header">Coccidia <span id="risk-coccidia">—%</span></div>
                    <div class="risk-bar"><div id="bar-coccidia" class="risk-fill"></div></div>
                </div>

                <div class="risk-item">
                    <div class="risk-header">Tick <span id="risk-tick">—%</span></div>
                    <div class="risk-bar"><div id="bar-tick" class="risk-fill"></div></div>
                </div>

            </div>
        </div>

        <div class="info-box">
            <h3>Conditions</h3>
            <div class="env-grid">
                <div class="env-item">🌡 <strong id="region-temp">—</strong></div>
                <div class="env-item">🌧 <strong id="region-rain">—</strong></div>
                <div class="env-item">🌱 <strong id="region-soil">—</strong></div>
                <div class="env-item">⛰️ <strong id="region-cattle">—</strong></div>
            </div>
        </div>

        <div class="info-box">
            <h3>Insights</h3>
            <p id="insight-text">Click map to view risk</p>
        </div>

    </aside>
</main>

</body>
</html>
