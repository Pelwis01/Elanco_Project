<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="shortcut icon" href="/Elanco_Project/images/favicon.png">

<!-- 🗺️ Leaflet -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- 🔥 Heatmap -->
<script src="https://unpkg.com/heatmap.js"></script>
<script src="https://cdn.jsdelivr.net/npm/leaflet-heatmap/leaflet-heatmap.js"></script>

<!-- 🔍 GeoSearch -->
<script src="https://unpkg.com/leaflet-geosearch@latest/dist/bundle.min.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet-geosearch@3.0.0/dist/geosearch.css"/>

<!-- 🎨 Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

<script src="onClick.js" defer></script>
<script src="parasiteCalculator.js" defer></script>
<script src="map-content.js" defer></script>
<script src="parasite_popup.js" defer></script>

<title>Elanco - Parasite Risk Map</title>
</head>

<body>

<nav class="navbar">
    <img class="navbar-logo" src="./images/logo.png" alt="Elanco Logo">
</nav>

<div class="notification-container"></div>

<div id="errorbox" style="display:none;">
    <div class="error-modal">
        <h3>⚠️</h3>
        <p id="error-message">API error – please try again shortly.</p>
    </div>
</div>

<main>

    <!-- MAP -->
    <div class="map-wrapper">
        <div id="map"></div>

        <div id="loading-overlay">
            <div class="loading-box">
                <div class="spinner"></div>
                <p>Loading environmental data…</p>
            </div>
        </div>
    </div>

    <!-- SIDEBAR -->
    <aside class="sidebar">

        <div class="card location-card">
            <span id="region-coords">53.377°, -1.467°</span>
            <h2 id="region-name">Sheffield</h2>
            <p id="region-address">Select a location on the map</p>
        </div>

        <div class="card">
            <div class="card-label">Conditions</div>
            <div class="env-strip">
                <div class="env-cell">
                    <span>🌡</span>
                    <span id="region-temp">—</span>
                    <small>°C</small>
                </div>
                <div class="env-cell">
                    <span>🌧</span>
                    <span id="region-rain">—</span>
                    <small>mm</small>
                </div>
                <div class="env-cell">
                    <span>🌱</span>
                    <span id="region-soil">—</span>
                    <small>%</small>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="sim-row">
                <div>
                    <strong>🧪 Summer Simulation</strong>
                    <small>+8°C, wetter</small>
                </div>
                <label class="switch">
                    <input type="checkbox" id="summer-sim">
                    <span class="slider"></span>
                </label>
            </div>
        </div>

        <div class="card">
            <div class="card-label">Parasite Risks</div>

            <div id="before-predictive" class="placeholder">
                Click map to view risks
            </div>

            <div id="predictive-data" class="hidden">

                <div class="time-row">
                    <span id="date-value">—</span>
                    <span id="hour-value">—:00</span>
                </div>

                <input type="range" id="hour" name="hour" min="0" max="72" value="0" onchange="changeDate(this.value)"/>

                <div class="risk-grid-compact">
                    <div class="risk-item"><span>Gutworm</span><span id="risk-gutworm" >—</span></div>
                    <div class="risk-item"><span>Lungworm</span><span id="risk-lungworm" >—</span></div>
                    <div class="risk-item"><span>Fluke</span><span id="risk-liverfluke" >—</span></div>
                    <div class="risk-item"><span>Hairworm</span><span id="risk-hairworm">—</span></div>
                    <div class="risk-item"><span>Coccidia</span><span id="risk-coccidia">—</span></div>
                    <div class="risk-item"><span>Tick</span><span id="risk-tick">—</span></div>
                </div>
            </div>
        </div>

    </aside>

</main>

</body>
</html>
